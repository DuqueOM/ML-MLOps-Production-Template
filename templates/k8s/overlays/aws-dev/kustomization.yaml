apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: "{service-name}-dev"

resources:
  - ../../base
  - namespace.yaml

images:
  - name: "{service-name}-predictor"
    newName: "{AWS_ACCOUNT_ID}.dkr.ecr.{REGION}.amazonaws.com/{service-name}-predictor"
    newTag: "v1.0.0"
  # Init container CLI — dev tier may use a moving tag (PR-R2-2, ADR-016).
  # Staging/prod overlays must add `digest: sha256:...`; see bootstrap
  # runbook `docs/runbooks/digest-pin-init-image.md`.
  - name: "cloud-cli-image"
    newName: "public.ecr.aws/aws-cli/aws-cli"
    newTag: "2"

patches:
  - path: patch-deployment.yaml
  - path: patch-serviceaccount.yaml
  # NetworkPolicy egress (May 2026 audit MED-11): the base NetworkPolicy
  # now defaults to ZERO public egress, so the dev overlay explicitly
  # opts in to the permissive 0.0.0.0/0 rule needed for the init
  # container model download. Staging/prod overlays patch a cloud-
  # specific narrow CIDR set instead.
  - path: patch-networkpolicy.yaml
    target:
      group: networking.k8s.io
      version: v1
      kind: NetworkPolicy
      name: "{service-name}-network-policy"
