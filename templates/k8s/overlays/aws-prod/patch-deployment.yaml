# =============================================================================
# AWS Production — Deployment patches
# =============================================================================
# - Init container uses amazon/aws-cli for S3 model download
# - IRSA provides S3 access (no hardcoded AWS credentials, D-18)
# - 2 replicas (D-27 PDB minimum)
#
# TODO: Replace {MODEL_BUCKET}, {service}, {REGION} with your actual values.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{service-name}-predictor"
spec:
  replicas: 2
  template:
    spec:
      initContainers:
        - name: model-downloader
          # Image is set by the overlay's `images:` mapping in
          # kustomization.yaml (PR-R2-2). Setting `image:` here would
          # bypass digest pinning enforced by the CI lint.
          # Production downloads model + signature + cert (May 2026
          # audit ADR-024 follow-up to HIGH-8). The verifier init
          # container fails the pod if any are missing.
          command:
            - sh
            - -ec
            - |
              aws s3 cp s3://{MODEL_BUCKET}/{service-name}/model.joblib     /models/model.joblib
              aws s3 cp s3://{MODEL_BUCKET}/{service-name}/model.joblib.sig /models/model.joblib.sig
              aws s3 cp s3://{MODEL_BUCKET}/{service-name}/model.joblib.pem /models/model.joblib.pem
          volumeMounts:
            - name: model-storage
              mountPath: /models
        # Production overrides: force enforce mode (May 2026 audit).
        - name: model-verifier
          env:
            - name: MODEL_SIGNATURE_VERIFY
              value: "true"
      containers:
        - name: "{service-name}-predictor"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          env:
            - name: MODEL_PATH
              value: /models/model.joblib
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "INFO"
            - name: AWS_DEFAULT_REGION
              value: "{REGION}"
            - name: ENVIRONMENT
              value: "production"
            # API auth + admin endpoint controls (PR-R2-1 + PR-R2-3, ADR-016)
            - name: API_AUTH_ENABLED
              value: "true"
            - name: ADMIN_API_ENABLED
              value: "false"
