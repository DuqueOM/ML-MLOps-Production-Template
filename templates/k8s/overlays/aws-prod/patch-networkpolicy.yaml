# JSON 6902 patch — R5-M3 egress narrowing for AWS production.
# See overlays/aws-staging/patch-networkpolicy.yaml for rationale.
# Separate file kept so prod can diverge (e.g., dedicated NAT CIDR)
# without touching staging.
# May 2026 audit MED-11: base now default-deny; APPEND instead of replacing.
- op: add
  path: /spec/egress/-
  value:
    to:
      - ipBlock:
          cidr: 52.0.0.0/8                 # S3 + ECR residual
      - ipBlock:
          cidr: 54.0.0.0/8                 # STS + Secrets Manager residual
          except:
            - 54.64.0.0/11
    ports:
      - protocol: TCP
        port: 443
