# =============================================================================
# Kustomize overlay — GCP Dev (GKE)
# =============================================================================
# Smallest footprint: 1 replica, dev-tier resources, baseline PSS.
# Used by templates/cicd/deploy-gcp.yml for auto-deploy on every push to main.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: "{service}-dev"

resources:
  - ../../base
  - namespace.yaml

images:
  - name: "{service}-predictor"
    newName: "{REGION}-docker.pkg.dev/{PROJECT_ID}/ml-images/{service}-predictor"
    newTag: "v1.0.0"

patches:
  - path: patch-deployment.yaml
  - path: patch-serviceaccount.yaml
