# =============================================================================
# Kustomize overlay — AWS Production (EKS)
# =============================================================================
# Patches:
#   - Docker image from ECR
#   - S3 model bucket for init container (aws-cli)
#   - IRSA annotation on ServiceAccount
#   - Production resource limits
#
# Deploy:
#   kustomize build k8s/overlays/aws-production/ | kubectl apply -f -
#
# TODO: Replace {AWS_ACCOUNT_ID}, {REGION}, {service} with your values.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-services

resources:
  - ../../   # Reference base kustomization

images:
  - name: "{service}-predictor"
    newName: "{AWS_ACCOUNT_ID}.dkr.ecr.{REGION}.amazonaws.com/{service}-predictor"
    newTag: "v1.0.0"   # Patched by CI/CD pipeline

patchesStrategicMerge:
  - patch-deployment.yaml
  - patch-serviceaccount.yaml
