# =============================================================================
# AWS Production — ServiceAccount with IRSA
# =============================================================================
# IAM Roles for Service Accounts (IRSA) lets EKS pods authenticate
# to AWS APIs without static credentials.
#
# Setup (one-time):
#   eksctl create iamserviceaccount \
#     --name {service}-sa \
#     --namespace ml-services \
#     --cluster {CLUSTER_NAME} \
#     --attach-policy-arn arn:aws:iam::{AWS_ACCOUNT_ID}:policy/{service}-s3-access \
#     --approve
#
# TODO: Replace {AWS_ACCOUNT_ID}, {service} with your actual values.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{service}-sa"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::{AWS_ACCOUNT_ID}:role/{service}-irsa-role"
