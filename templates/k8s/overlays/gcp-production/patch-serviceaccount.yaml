# =============================================================================
# GCP Production — ServiceAccount with Workload Identity
# =============================================================================
# Workload Identity lets K8s pods authenticate to GCP APIs without
# static credentials. The pod's KSA maps to a GCP IAM SA.
#
# Setup (one-time):
#   gcloud iam service-accounts add-iam-policy-binding \
#     {service}-sa@{PROJECT_ID}.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:{PROJECT_ID}.svc.id.goog[ml-services/{service}-sa]"
#
# TODO: Replace {PROJECT_ID}, {service} with your actual values.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{service}-sa"
  annotations:
    iam.gke.io/gcp-service-account: "{service}-sa@{PROJECT_ID}.iam.gserviceaccount.com"
