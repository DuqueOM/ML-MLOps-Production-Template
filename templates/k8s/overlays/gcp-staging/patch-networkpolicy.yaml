# JSON 6902 patch — R5-M3 egress narrowing for GCP staging.
#
# Replaces the base NetworkPolicy's wildcard `0.0.0.0/0:443` egress rule
# (index 3 in templates/k8s/base/networkpolicy.yaml) with a GCP-specific
# allowlist. Staging + prod MUST use this patch; dev keeps the wildcard.
#
# Target egress destinations on GCP:
#   - Artifact Registry / Container Registry (HTTPS pulls for the
#     init-container CLI image and the service image) — `*.pkg.dev`,
#     `*.gcr.io`, `artifactregistry.googleapis.com`.
#   - Cloud Storage (GCS) for model + DVC artifacts —
#     `storage.googleapis.com`, regional buckets under `*.googleapis.com`.
#   - Secret Manager — `secretmanager.googleapis.com`.
#   - Google private API access (if the cluster uses Private Google
#     Access) — `private.googleapis.com` = 199.36.153.8/30,
#     `restricted.googleapis.com` = 199.36.153.4/30.
#
# NetworkPolicy ipBlock cannot express FQDNs, so the pragmatic choice
# is to allow the Private Google Access CIDRs + the googleapis public
# NAT egress range. Adopters with stricter egress (egress proxy + L7
# policy via Cilium CNP / GKE Dataplane V2) SHOULD layer a CiliumNetworkPolicy
# on top of this — see docs/runbooks/egress-narrowing.md §B.3.
#
# TODO (operator): if your GKE cluster uses a VPC-native egress NAT
# gateway with a published egress CIDR, prefer that exact CIDR over
# `0.0.0.0/0 except rfc1918` below.
# May 2026 audit MED-11: base NetworkPolicy now ships with default-deny
# egress (no `0.0.0.0/0` fallback rule at index 3). This patch APPENDS
# the GCP-narrow rule via `op: add /spec/egress/-` instead of replacing
# a non-existent index.
- op: add
  path: /spec/egress/-
  value:
    # Private Google Access virtual IPs (fixed by GCP, safe to hardcode):
    #   199.36.153.4/30 — restricted.googleapis.com
    #   199.36.153.8/30 — private.googleapis.com
    to:
      - ipBlock:
          cidr: 199.36.153.4/30
      - ipBlock:
          cidr: 199.36.153.8/30
      # Public googleapis range — residual until FQDN policy ships.
      # Tighter than the base 0.0.0.0/0 (excludes all non-googleapis
      # public IPs) but still broader than a pure FQDN allowlist.
      # See R5-M3 follow-up in ACTION_PLAN_R5.md.
      - ipBlock:
          cidr: 34.0.0.0/8
          except:
            - 34.64.0.0/10       # GCE internal, narrow further if needed
    ports:
      - protocol: TCP
        port: 443
