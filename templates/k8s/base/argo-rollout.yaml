# =============================================================================
# Argo Rollouts — Canary Deployment for {ServiceName}
# =============================================================================
# OPT-IN. Not included in `templates/k8s/base/kustomization.yaml` because
# Argo Rollouts and Deployment cannot both manage the same selector
# (`app: {service-name}`) — name collision. To enable the progressive-
# delivery path, in your overlay's `kustomization.yaml`:
#
#   resources:
#     - ../../base                    # but exclude deployment.yaml via patch
#     - ../../base/argo-rollout.yaml
#   patches:
#     - patch: |-
#         $patch: delete
#         apiVersion: apps/v1
#         kind: Deployment
#         metadata:
#           name: {service-name}-predictor
#
# Progressive delivery: sends traffic to the new model version incrementally
# while monitoring Prometheus metrics via the AnalysisTemplate (champion/
# challenger online proxies — see analysistemplate-champion-challenger.yaml).
#
# Canary steps:
#   1. 10% traffic → pause 2 min (observe metrics)
#   2. 30% traffic → pause 2 min
#   3. 60% traffic → pause 2 min
#   4. 100% traffic → fully promoted
#
# Security parity contract (May 2026 audit CRIT-4): this manifest MUST stay
# in lock-step with `deployment.yaml` for:
#   - PSS 'restricted' pod-level + container-level securityContext
#   - tolerations for the workload-type=ml-services taint
#   - DEPLOYMENT_ID via Downward API
#   - SERVICE_METRIC_PREFIX env var (audit Critical-3)
#   - terminationGracePeriodSeconds = 30 + uvicorn --timeout-graceful-shutdown=20
#   - probes split: startup/readiness/liveness
#   - init container by symbolic image name (rewritten per overlay; never
#     `:latest` and never `google/cloud-sdk:slim` literally — staging/prod
#     overlays pin by digest via `images:` mapping).
# A divergence here is a regression. The contract test
# `tests/test_argo_rollout_security_parity.py` enforces it.
#
# Prerequisites:
#   - Argo Rollouts controller installed:
#     `kubectl create namespace argo-rollouts && \`
#     `kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/download/v1.6.6/install.yaml`
#   - Prometheus configured as AnalysisTemplate metric provider
#   - Istio/Nginx TrafficRouting for weighted traffic splitting
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: "{service-name}-predictor"
  labels:
    app: "{service-name}"
    managed-by: kustomize
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: "{service-name}"
  template:
    metadata:
      labels:
        app: "{service-name}"
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        # PR-C1 (ADR-015): correlation id for the deploy that produced this Pod.
        # Patched by `deploy-common.yml` at apply time. See deployment.yaml.
        windsurf.io/deployment-id: "local"
    spec:
      serviceAccountName: "{service-name}-sa"

      # Pod-level securityContext — PSS 'restricted' (parity with deployment.yaml).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      # Workload pool toleration (ADR-015 PR-A3). Same key/value as deployment.yaml.
      tolerations:
        - key: workload-type
          operator: Equal
          value: ml-services
          effect: NoSchedule

      # Init container — model download. Image is the symbolic
      # `cloud-cli-image` placeholder rewritten per overlay (gsutil for
      # GCP, aws-cli for AWS) and pinned by digest in staging/prod.
      # NEVER `google/cloud-sdk:slim` literal here.
      initContainers:
        - name: model-downloader
          image: cloud-cli-image:placeholder
          command:
            - gsutil
            - cp
            - gs://{MODEL_BUCKET}/{service-name}/model.joblib
            - /models/model.joblib
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - name: model-storage
              mountPath: /models

      # Graceful shutdown (D-25) — coordinated with uvicorn --timeout-graceful-shutdown=20.
      terminationGracePeriodSeconds: 30

      containers:
        - name: "{service-name}-predictor"
          # Image is patched by Kustomize overlay (`images:` mapping) — never
          # leave `:latest` rendered in staging/prod (the validate-templates
          # workflow lints the rendered overlay).
          image: "{service-name}-predictor:latest"
          command: ["uvicorn"]
          args:
            - "app.main:app"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--timeout-graceful-shutdown=20"
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MODEL_PATH
              value: /models/model.joblib
            - name: MODEL_VERSION
              value: "v1.0.0"
            - name: BACKGROUND_DATA_PATH
              value: /app/data/reference/background.csv
            - name: SERVICE_METRIC_PREFIX
              value: "{service}"
            # PR-C1 — DEPLOYMENT_ID via Downward API. See deployment.yaml.
            - name: DEPLOYMENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['windsurf.io/deployment-id']
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          # Container-level PSS 'restricted'.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          # Probe split (D-23): see deployment.yaml for full explanation.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true

      volumes:
        - name: model-storage
          emptyDir: {}

  strategy:
    canary:
      # Canary analysis — runs '{service-name}-cc-online' (ADR-008).
      # The AnalysisTemplate itself lives in
      # analysistemplate-champion-challenger.yaml so the C/C rules are
      # version-controlled independently of the rollout manifest.
      # See that file for the 4 proxy metrics (prediction log health,
      # error rate vs stable, score-distribution shift, p95 latency).
      analysis:
        templates:
          - templateName: "{service-name}-cc-online"
        args:
          - name: service-name
            value: "{service}"
          # Populated by Argo Rollouts at canary time:
          - name: canary-version
            valueFrom:
              podTemplateHashValue: Latest
          - name: stable-version
            valueFrom:
              podTemplateHashValue: Stable

      # Progressive traffic shifting — 8 minutes total with analysis
      # firing every 30s for a total of 8 measurements per step pair.
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - setWeight: 30
        - pause: { duration: 2m }
        - setWeight: 60
        - pause: { duration: 2m }
        - setWeight: 100

      # Auto-rollback on failure
      maxSurge: 1
      maxUnavailable: 0
