# =============================================================================
# Kustomize base — common resources for all environments
# =============================================================================
# Usage:
#   kustomize build k8s/base/                     # Render base
#   kustomize build k8s/overlays/gcp-{dev,staging,prod}/  # Render GCP overlay
#   kustomize build k8s/overlays/aws-{dev,staging,prod}/  # Render AWS overlay
#
# TODO: Replace {service} with your actual service name.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Default namespace ONLY for `kustomize build templates/k8s/base` standalone.
# Every overlay overrides this via its own `namespace:` field
# (e.g. `{service-name}-prod`, `{service-name}-staging`, `{service-name}-dev`),
# which is the supported deployment path. Audit R2 / PR-R2-3
# ensured no resource hardcodes `namespace: ml-services` so the
# overlay's value reaches every Role / RoleBinding / NetworkPolicy /
# PrometheusRule.
namespace: ml-services

labels:
  - pairs:
      app: "{service-name}"
      managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - serviceaccount.yaml
  - cronjob-drift.yaml
  - cronjob-performance.yaml
  - performance-prometheusrule.yaml
  # SLO recording + multi-window/multi-burn-rate alerts (Google SRE workbook).
  # Wired in May 2026 audit response: previously the file shipped under
  # base/ but was NOT in `resources:`, so `kustomize build` produced a
  # stack without burn-rate alerts even though the file existed. The
  # contract test `test_kustomization_includes_slo_prometheusrule` now
  # enforces this entry.
  - slo-prometheusrule.yaml
  - analysistemplate-champion-challenger.yaml
  - networkpolicy.yaml
  - networkpolicy-deny-default.yaml
  - rbac.yaml
