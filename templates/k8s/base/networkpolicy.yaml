# NetworkPolicy — Restrict traffic to/from ML service pods
# Enterprise requirement for regulated environments (fintech, healthcare).
#
# This policy:
#   1. Allows ingress only from pods with label app: ingress-nginx (or your ingress controller)
#   2. Allows ingress from Prometheus for /metrics scraping
#   3. Allows egress to DNS, cloud storage (model download), and MLflow
#   4. Denies all other traffic by default
#
# TODO: Replace {service} with your service name.
# TODO: Adjust namespaceSelector and podSelector for your cluster layout.
# TODO: Add CIDR blocks for your cloud provider's storage endpoints if needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{service-name}-network-policy"
  # Namespace is OWNED by the overlay (kustomization.yaml `namespace:`).
  # Hardcoding it here would silently route traffic to the wrong NS in
  # any env whose overlay uses a different namespace (PR-R2-3, audit R2).
  labels:
    app: "{service-name}"
    managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: "{service-name}"
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

    # Allow Prometheus scraping on /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow egress to MLflow tracking server
    - to:
        - podSelector:
            matchLabels:
              app: mlflow
      ports:
        - protocol: TCP
          port: 5000

    # Allow egress to Prometheus Pushgateway (drift metrics)
    - to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: pushgateway
      ports:
        - protocol: TCP
          port: 9091

    # -----------------------------------------------------------------
    # Cloud storage egress (model download during init container).
    #
    # BASE RULE = DEFAULT-DENY (May 2026 audit MED-11).
    #
    # Previous behaviour: the base shipped a permissive `0.0.0.0/0`
    # rule "for dev convenience". Defense-in-depth fails open when an
    # overlay forgets to apply the cloud-narrowing patch, so the base
    # now ships ZERO public egress and overlays MUST add their own
    # rule. The dev overlay applies a permissive rule for adopter
    # convenience; staging and prod overlays add cloud-specific
    # FQDN-backed CIDR rules.
    #
    # Contract test `tests/test_networkpolicy_egress_hygiene.py` now
    # also fails if the `dev` overlay forgets the permissive patch
    # (so `kustomize build overlays/gcp-dev` still produces a working
    # init container without manual edits).
    # -----------------------------------------------------------------
    # Intentionally empty: every environment opts in via patch.
