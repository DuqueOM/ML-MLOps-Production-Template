# =============================================================================
# Agentic Manifest — ADR-023 §agentic-manifest.
# =============================================================================
# READ-ONLY INDEX. This file drives thin adapter rendering; it never copies canonical bodies.
#   - `scripts/validate_agentic_manifest.py --strict` validates coherence:
#       * every `authority:` anchor resolves to a heading in AGENTS.md
#         or an existing ADR;
#       * every skill/workflow/rule listed here exists at its declared
#         path (currently .windsurf/ is authoritative);
#       * every surface declared in `surfaces:` has the consumer files
#         listed under its entry (cursor has 14 rule files, claude has
#         12 command files, etc.);
#       * no `escalation_override` de-escalates a mode.
#
# Adapter files are rendered by `scripts/sync_agentic_adapters.py`.
# The rendered files are pointers only; `.windsurf/` remains canonical.
#
# Invariant I-1 (ADR-023 §3): every policy claim here carries an
# `authority:` reference to AGENTS.md#<section> or an ADR file path.
# =============================================================================
version: 1

# -----------------------------------------------------------------------------
# Canonical authority chain. The validator resolves these on load.
# -----------------------------------------------------------------------------
canonical:
  behavior_protocol:
    path: "AGENTS.md"
    authority: "AGENTS.md#Agent Behavior Protocol"
  invariants:
    path: "AGENTS.md"
    authority: "AGENTS.md#Critical Patterns \u2014 DO NOT VIOLATE"
  permissions_matrix:
    path: "AGENTS.md"
    authority: "AGENTS.md#Agent Permissions Matrix"
  dynamic_risk:
    path: "templates/common_utils/risk_context.py"
    authority: "docs/decisions/ADR-010-dynamic-behavior-protocol.md"
  ci_autofix_policy:
    path: "templates/config/ci_autofix_policy.yaml"
    authority: "docs/decisions/ADR-019-agentic-ci-self-healing.md"
  model_routing_policy:
    path: "templates/config/model_routing_policy.yaml"
    authority: "docs/decisions/ADR-014-gap-remediation-plan.md"
  memory_plane:
    path: "ops/audit.jsonl"
    authority: "docs/decisions/ADR-018-operational-memory-plane.md"
  context_layer:
    company_template: "templates/config/company_context.example.yaml"
    project_template: "templates/config/project_context.example.yaml"
    schema: "templates/config/context.schema.json"
    authority: "docs/decisions/ADR-023-agentic-portability-and-context.md"

