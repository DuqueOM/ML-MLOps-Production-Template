# -----------------------------------------------------------------------------
# Surfaces — where each surface's files live. The validator counts adapters.
# -----------------------------------------------------------------------------
surfaces:
  windsurf:
    status: "authoritative"
    roots:
      rules: ".windsurf/rules"
      skills: ".windsurf/skills"
      workflows: ".windsurf/workflows"
    context_pointer: ".windsurf_context.md"
  cursor:
    status: "adapter"
    roots:
      rules: ".cursor/rules"
      commands: ".cursor/commands"
      skills: ".cursor/skills"
      skills_index: ".cursor/skills/INDEX.md"
    context_pointer: ".cursor_context.md"
  claude:
    status: "adapter"
    roots:
      rules: ".claude/rules"
      commands: ".claude/commands"
      skills: ".claude/skills"
      skills_index: ".claude/skills/INDEX.md"
    context_pointer: ".claude_context.md"
  codex:
    status: "adapter"
    # Codex consumes the full canonical set through generated pointer
    # files. Live MCP config remains adopter-owned and gitignored.
    roots:
      readme: ".codex/README.md"
      rules: ".codex/rules"
      skills: ".codex/skills"
      workflows: ".codex/workflows"
      automations: ".codex/automations"
      mcp_example: ".codex/mcp.example.json"
    context_pointer: ".codex_context.md"

# -----------------------------------------------------------------------------
# Integration hints — where other machinery reads the context layer.
# Only informative; the runtime code owns its own defaults.
# -----------------------------------------------------------------------------
context_consumers:
  - module: "templates/common_utils/risk_context.py"
    reads:
      - "company.risk_appetite"
      - "company.monthly_budget_usd"
      - "company.on_hours_utc"
      - "project.criticality"
      - "project.agentic_policy.escalation_overrides"
    authority: "docs/decisions/ADR-010-dynamic-behavior-protocol.md"

# -----------------------------------------------------------------------------
# Reports v1 (ADR-023 F6) — typed report contract for the four canonical
# producer workflows. Every entry references its producer + consumer so
# the cross-surface picture is auditable from the manifest alone.
# -----------------------------------------------------------------------------
reports:
  schema: "templates/config/report_schema.json"
  library: "templates/common_utils/reports.py"
  cli: "scripts/generate_report.py"
  storage_root: "ops/reports/"
  authority: "docs/decisions/ADR-023-agentic-portability-and-context.md"
  types:
    - id: "release"
      producer: "release-checklist"
      consumers: ["github_actions", "humans"]
      mode: "CONSULT"
    - id: "drift"
      producer: "drift-detection"
      consumers: ["model-retrain", "humans"]
      mode: "AUTO"
    - id: "training"
      producer: "model-retrain"
      consumers: ["release-checklist", "humans"]
      mode: "AUTO"
    - id: "incident"
      producer: "incident"
      consumers: ["humans", "post-mortem"]
      mode: "CONSULT"

# -----------------------------------------------------------------------------
# Companions (ADR-023 F7 / F8 / F9) — docs-only integration patterns.
#
# A companion is NOT a new surface and does NOT introduce skills or workflows.
# It is a documented wiring pattern that lets an existing surface
# (or a managed-agent platform like Vertex AI / AgentCore) consume the
# canonical agentic stack defined above.
#
# Contract test: `templates/service/tests/test_companions_contract.py`.
# -----------------------------------------------------------------------------
companions:
  - id: "runtime-monitoring"
    feature: "F7"
    kind: "consumption-pattern"
    doc: "docs/agentic/runtime-monitoring-companion.md"
    requires_mcps: ["prometheus", "github", "kubectl"]
    write_capable: false
    surfaces: ["windsurf", "cursor", "claude", "codex"]
    authority: "docs/decisions/ADR-023-agentic-portability-and-context.md"
    status: "shipped"
  - id: "gcp-gemini-enterprise"
    feature: "F8"
    kind: "cloud-companion"
    doc: "docs/agentic/cloud-companions.md"
    provider: "gcp"
    write_capable: false
    surfaces_native: []
    authority: "docs/decisions/ADR-023-agentic-portability-and-context.md"
    status: "shipped (docs-only)"
  - id: "aws-bedrock-agentcore"
    feature: "F9"
    kind: "cloud-companion"
    doc: "docs/agentic/cloud-companions.md"
    provider: "aws"
    write_capable: false
    surfaces_native: []
    authority: "docs/decisions/ADR-023-agentic-portability-and-context.md"
    status: "shipped (docs-only)"
