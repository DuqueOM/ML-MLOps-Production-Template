name: CI — Infrastructure

on:
  push:
    branches: [main, develop]
    paths:
      - "infra/**"
      - "k8s/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "k8s/**"

jobs:
  terraform-validate:
    name: Terraform — ${{ matrix.cloud }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [gcp, aws]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra/terraform/${{ matrix.cloud }}

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infra/terraform/${{ matrix.cloud }}

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform/${{ matrix.cloud }}

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infra/terraform/${{ matrix.cloud }}
          format: json

      - name: Checkov
        # Pinned to immutable tag (D-19, ADR-014 §1.1). Dependabot updates
        # via .github/dependabot.yml. Phase 5 will harden to commit-SHA.
        uses: bridgecrewio/checkov-action@v12.2752.0
        with:
          directory: infra/terraform/${{ matrix.cloud }}
          quiet: true
          framework: terraform

  k8s-validate:
    name: K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform (PR-R2-5)
        # Replaces the deprecated kubeval install that used
        # /releases/latest/download/. Pinned version, direct release
        # tarball, no `curl | bash`. kubeval was archived upstream;
        # kubeconform is the maintained successor and is also used
        # by the top-level validate-templates.yml.
        run: |
          set -euo pipefail
          KCVER=v0.6.7
          curl -sSL -o /tmp/kubeconform.tgz \
            "https://github.com/yannh/kubeconform/releases/download/${KCVER}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tgz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate base manifests
        run: kubeconform -strict -ignore-missing-schemas k8s/base/*.yaml

      - name: Validate GCP overlays (per environment)
        run: |
          for overlay in k8s/overlays/gcp-*; do
            [ -d "$overlay" ] && kubectl kustomize "$overlay" | kubeconform -strict -ignore-missing-schemas
          done
        continue-on-error: true

      - name: Validate AWS overlays (per environment)
        run: |
          for overlay in k8s/overlays/aws-*; do
            [ -d "$overlay" ] && kubectl kustomize "$overlay" | kubeconform -strict -ignore-missing-schemas
          done
        continue-on-error: true
