# Pre-commit hooks for ML service quality
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
#
# Hooks: black (format) → isort (imports) → flake8 (lint) → mypy (types)
#        → bandit (security) → gitleaks (secrets)

repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=120"]
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile=black", "--line-length=120"]
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args:
          - "--python-version=3.11"
          - "--ignore-missing-imports"
        # TODO: Update file pattern to match your service directory
        files: ^(app/|src/|tests/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  # Security linting with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-ll', '-i']
        exclude: ^.*\/tests\/

  # Secret detection with gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret detection)
        description: Detect hardcoded secrets in code
        args: ['--config=.gitleaks.toml']
        pass_filenames: false
