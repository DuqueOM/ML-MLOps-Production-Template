# Pre-commit hooks for ML-MLOps Production Template contributors
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
#
# Enforces: black → isort → flake8 on templates/ and examples/
# For the per-service hooks (includes mypy, bandit, gitleaks), see templates/.pre-commit-config.yaml

repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=120"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile=black", "--line-length=120"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.md$
      - id: end-of-file-fixer
        exclude: ^.*\.md$
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Secret detection with gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: gitleaks (secret detection)
        description: Detect hardcoded secrets in template code
        args: ["--config=.gitleaks.toml"]
        pass_filenames: false
