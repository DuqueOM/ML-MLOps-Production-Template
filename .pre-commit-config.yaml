# Pre-commit hooks — MANDATORY first-filter for contributors.
#
# This is the FIRST gate before any code enters the repo. CI is the
# last-line safety net (it re-runs these same hooks on every PR via
# `validate-templates.yml`), but pre-commit must catch the 90% case
# at commit time, before a PR is even opened. If pre-commit is green
# locally, CI's lint lane must be green too — same config, same
# versions, no drift.
#
# Install (ONE command — pre-commit stage only as of R5-L4):
#
#   pip install pre-commit
#   pre-commit install                   # reads default_install_hook_types below
#
# Run all (debug or one-shot full sweep):
#
#   pre-commit run --all-files
#
# Single-stage design (pre-commit only):
#
#   pre-commit stage (< 5s target): formatting, lint, type check, security
#     lint, secret detection, fast contract tests. Blocks the commit itself.
#
# pre-push (~60s scaffold smoke) was REMOVED in R5-L4 (May 2026) because
# it duplicated `.github/workflows/pr-smoke-lane.yml` AND triggered
# `--no-verify` normalization on contributors who pushed frequently. The
# replacement chain is:
#
#   - on demand:           `make smoke` (~60s scaffold end-to-end)
#   - on demand (full):    `make validate-templates` (lint + render + scaffold + EDA)
#   - per PR (authoritative gate): `pr-smoke-lane.yml`
#
# Drift between local and CI means green local → red CI, which is the
# slowest and most expensive feedback loop. Avoid by version-pinning
# and by mirroring the order CI runs them in `validate-templates.yml`.
# This file is the single source of truth (CI re-uses it via
# `pre-commit run --all-files` since 2026-04-28).
#
# For the per-service hook config, see `templates/.pre-commit-config.yaml`.

# Single-stage install — pre-push stage was retired in R5-L4 (May 2026);
# `make smoke` + CI pr-smoke-lane.yml replace it.
default_install_hook_types: [pre-commit]

# fail_fast: false is the DEFAULT (shown explicit for intent) — we
# want contributors to see EVERY violation in one run, not stop at
# the first. Fewer commit → fix → commit → fix → commit cycles.
fail_fast: false

repos:
  - repo: https://github.com/psf/black
    # 25.1.0 fixes the f-string-with-regex parser bug that 24.4.2 hit
    # on templates/service/tests/test_api.py:201. See commit history.
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=120"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile=black", "--line-length=120"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.md$
      - id: end-of-file-fixer
        exclude: ^.*\.md$
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # mypy + bandit scope: REAL Python only.
  # `templates/service/src/{service}/` is template territory — the
  # `{service}` segment is a placeholder that new-service.sh
  # substitutes at scaffold time. Running static analysis on the
  # un-substituted templates explodes (mypy: "{service} is not a
  # valid Python package name"). The scaffolded SERVICE gets its
  # OWN per-service hook config (templates/.pre-commit-config.yaml).
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args:
          - "--python-version=3.11"
          - "--ignore-missing-imports"
          - "--no-strict-optional"
        files: ^(templates/common_utils/|examples/|scripts/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/tests\/|
            ^.*\/__pycache__\/|
            ^scripts/test_scaffold\.sh$
          )
        additional_dependencies:
          - "pydantic>=2.0"
          - "types-PyYAML"
          - "types-requests"

  # Security lint — bandit catches obvious patterns (eval, hardcoded
  # tmp paths, shell=True, weak crypto). `-ll -i` = LOW severity LOW
  # confidence threshold ignored, so we get medium+ only — enough
  # signal without overwhelming.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-ll", "-i"]
        files: ^(templates/common_utils/|examples/|scripts/)
        exclude: ^.*\/tests\/

  # Secret detection with gitleaks (D-17, D-18 invariants)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret detection)
        description: Detect hardcoded secrets in template code
        args: ["--config=.gitleaks.toml"]
        pass_filenames: false

  # Project's OWN gates — run them locally so contributors don't
  # wait for CI to discover an agentic-config drift. These are
  # cheap (< 2s each) and they're already required by CI; running
  # locally is pure win.
  - repo: local
    hooks:
      - id: validate-agentic
        name: validate agentic system (rules/skills/workflows/AGENTS.md)
        description: |
          Runs scripts/validate_agentic.py --strict to catch drift
          between AGENTS.md and the agent runtime config (rules,
          skills, workflows). Same script CI runs.
        entry: python3 scripts/validate_agentic.py --strict
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|\.windsurf/|\.cursor/|\.claude/|scripts/validate_agentic\.py)
      - id: ci-autofix-policy-contract
        name: CI autofix policy contract (ADR-019)
        description: |
          The two governance YAMLs in templates/config/ have a
          contract test (10 invariants). Run it locally on every
          commit that touches them so policy drift never reaches CI.
        # --noconftest: the sibling conftest.py imports numpy (needed
        # for the service test suite but not for this contract test).
        # --rootdir: avoids pytest walking up to the repo pyproject.toml
        # which applies coverage plugins this hook doesn't need.
        entry: python3 -m pytest templates/service/tests/test_ci_autofix_policy_contract.py -q -o addopts="" --noconftest --rootdir=.
        language: system
        pass_filenames: false
        files: ^(templates/config/(ci_autofix_policy|model_routing_policy)\.yaml|templates/service/tests/test_ci_autofix_policy_contract\.py)$

  # NOTE: scaffold smoke test was previously a pre-push hook here.
  # Removed per R5-L4 (audit-r4 / R5 mini-audit, May 2026). Rationale:
  #   - the same scaffold + 6 overlay renders + kubeconform + binary
  #     audit runs on every PR via .github/workflows/pr-smoke-lane.yml
  #   - >60s on every push triggers `--no-verify` normalization, which
  #     silently kills the invariant the hook was protecting
  #   - industry baseline: pre-commit < 5 s, pre-push < 30 s, CI per-PR
  #     3–10 min (Software Engineering at Google §4.2)
  # On-demand local runs:
  #   make smoke              # alias of: bash scripts/test_scaffold.sh
  #   make validate-templates # full local validation chain
  # See docs/audit/ACTION_PLAN_R5.md §R5-L4 for the full decision record.
