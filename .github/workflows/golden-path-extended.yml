# =============================================================================
# Golden Path E2E — EXTENDED (PR-R2-9, ADR-016)
#
# The base `golden-path.yml` proves: scaffold → build → deploy → audit.
# It does NOT prove that the closed-loop signals (prediction logger,
# /metrics counters) actually fire end-to-end on a live deployment.
#
# This extended workflow runs AFTER the base golden path succeeds and
# adds the runtime verification the audit asked for:
#
#   Stage 1 (closed-loop verification, this commit):
#     1. Re-deploy the scaffolded service in a fresh kind cluster
#     2. Port-forward predictor service
#     3. Post 100 valid + 5 invalid requests through /predict
#     4. Curl /metrics, assert <svc>_prediction_log_total >= 100
#     5. Tear down
#
#   Stage 2 (PR-R2-9b, alert-firing — explicit follow-on):
#     6. Install minimal Prometheus + Pushgateway in the cluster
#     7. Load the scaffolded PrometheusRule with the service's
#        DriftAlert expression ({service}_psi_score > 0.20)
#     8. Push synthetic series with PSI > 0.40 (2× threshold) to
#        Pushgateway
#     9. Poll Prometheus /api/v1/alerts; assert DriftAlert transitions
#        to `firing` within for: 2m
#
# Stage 2 is documented as PR-R2-9b in ADR-016 because it requires
# additional helm-chart wiring (kube-prometheus-stack-lite or equivalent)
# that benefits from being shipped behind its own contract test rather
# than landing inside this workflow.
#
# Triggers:
#   - workflow_run: after Golden Path E2E completes successfully on main
#   - workflow_dispatch: on-demand from Actions tab
#   - schedule: weekly Tuesdays 06:00 UTC (one day after policy-tests
#     so any policy regression surfaces first)
# =============================================================================

name: Golden Path E2E (extended)

on:
  workflow_run:
    workflows: ["Golden Path E2E"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 2"

permissions:
  contents: read
  id-token: write
  packages: read

env:
  SERVICE_NAME: GoldenPath
  SERVICE_SLUG: goldenpath
  KIND_IMAGE: kindest/node:v1.30.0
  PORT: 8000

jobs:
  # =========================================================================
  # closed-loop-verification
  # =========================================================================
  # Stage 1 of PR-R2-9: prove the scaffolded service actually emits the
  # `<svc>_prediction_log_total` counter when traffic flows through
  # /predict. This catches drift between the prediction logger's
  # buffered-flush contract (D-21, D-22) and the live serving path.
  # =========================================================================
  closed-loop-verification:
    name: Post traffic + verify /metrics counter increments
    # Only run if the base Golden Path E2E succeeded (workflow_run only;
    # workflow_dispatch + schedule bypass this gate).
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Tooling install (mirror golden-path.yml — no curl|bash, pinned
      # versions via canonical actions or direct release tarballs).
      # ---------------------------------------------------------------------
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kustomize
        run: |
          set -euo pipefail
          KVER=v5.4.3
          curl -sSL -o /tmp/kustomize.tgz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KVER}/kustomize_${KVER}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/

      # ---------------------------------------------------------------------
      # Re-scaffold the service. We DON'T reuse golden-path.yml's
      # scaffold artifact because (a) its retention may have expired by
      # the time this runs on schedule, and (b) re-scaffolding is ~45s
      # which is cheap relative to the cluster setup below.
      # ---------------------------------------------------------------------
      - name: Scaffold service via new-service.sh
        run: |
          set -euo pipefail
          bash templates/scripts/new-service.sh "${SERVICE_NAME}" "${SERVICE_SLUG}"
          test -d "${SERVICE_NAME}"

      - name: Patch dev overlay for synthetic CI model
        run: |
          set -euo pipefail
          cd "${SERVICE_NAME}/k8s/overlays/gcp-dev"
          cat <<'EOF' >> kustomization.yaml

            # Golden Path CI only: remove cloud model download and allow
            # the app's guarded synthetic model fallback. Production
            # overlays keep the real init container and MODEL_PATH contract.
            - target:
                kind: Deployment
                name: goldenpath-predictor
              patch: |-
                - op: remove
                  path: /spec/template/spec/initContainers
                - op: add
                  path: /spec/template/spec/containers/0/env/-
                  value:
                    name: ALLOW_MODELLESS_STARTUP
                    value: "true"
                - op: add
                  path: /spec/template/spec/containers/0/env/-
                  value:
                    name: ENVIRONMENT
                    value: "ci"
          EOF

      # ---------------------------------------------------------------------
      # Build a minimal image. Same Dockerfile path as golden-path.yml
      # but without cosign signing — we only need a working binary for
      # closed-loop traffic.
      # ---------------------------------------------------------------------
      - name: Build predictor image
        working-directory: ${{ env.SERVICE_NAME }}
        run: |
          set -euo pipefail
          docker build -t "localhost:5001/${SERVICE_SLUG}-predictor:test" .

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: golden-path-ext
          node_image: ${{ env.KIND_IMAGE }}
          wait: 120s

      - name: Load image into kind
        run: |
          kind load docker-image \
            "localhost:5001/${SERVICE_SLUG}-predictor:test" \
            --name golden-path-ext

      # ---------------------------------------------------------------------
      # Deploy the scaffolded overlay. We use the same dev overlay the
      # base golden path uses; the extended workflow's value-add is the
      # POST-DEPLOY verification, not a different deploy strategy.
      # ---------------------------------------------------------------------
      - name: Patch overlay image ref
        working-directory: ${{ env.SERVICE_NAME }}
        run: |
          set -euo pipefail
          # Replace the image placeholder with the local kind image
          # via kustomize edit (avoids fragile sed against image refs
          # that may include digests in some overlays).
          cd k8s/overlays/gcp-dev
          kustomize edit set image \
            "${SERVICE_SLUG}-predictor=localhost:5001/${SERVICE_SLUG}-predictor:test"

      - name: Apply overlay (gcp-dev)
        working-directory: ${{ env.SERVICE_NAME }}
        run: |
          set -euo pipefail
          # Tolerate only the known platform CRDs absent in synthetic
          # kind (AnalysisTemplate, PrometheusRule). Any other apply
          # error is a real regression.
          set +e
          kustomize build k8s/overlays/gcp-dev | kubectl apply -f - 2> /tmp/apply.err
          apply_rc=$?
          set -e
          cat /tmp/apply.err
          if [ "${apply_rc}" -ne 0 ]; then
            if grep -Ev 'no matches for kind "(AnalysisTemplate|PrometheusRule)"' /tmp/apply.err | grep -q .; then
              echo "::error::kubectl apply failed for reasons other than known missing CRDs"
              exit "${apply_rc}"
            fi
          fi
          # Hard requirement: namespace + predictor exist
          kubectl get ns "${SERVICE_SLUG}-dev" >/dev/null
          kubectl -n "${SERVICE_SLUG}-dev" get deployment "${SERVICE_SLUG}-predictor" >/dev/null

      - name: Wait for predictor rollout
        run: |
          set -euo pipefail
          kubectl rollout status "deployment/${SERVICE_SLUG}-predictor" -n "${SERVICE_SLUG}-dev" --timeout=180s
          kubectl -n "${SERVICE_SLUG}-dev" get pods,svc

      # ---------------------------------------------------------------------
      # The audit's Stage 1 contract: post 100 valid + 5 invalid; check
      # the prediction-log counter. Counter MUST be at least 100 (the
      # buffered flush from common_utils/prediction_logger.py is the
      # whole point of D-21).
      # ---------------------------------------------------------------------
      - name: Port-forward predictor service
        run: |
          kubectl -n "${SERVICE_SLUG}-dev" port-forward \
            "svc/${SERVICE_SLUG}-service" "${PORT}:8000" \
            >/tmp/portfwd.log 2>&1 &
          echo $! > /tmp/portfwd.pid
          # Give port-forward a moment to establish
          sleep 5

      - name: Wait for /health to respond
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:${PORT}/health" >/dev/null 2>&1; then
              echo "/health responding after ${i} attempts"
              break
            fi
            sleep 2
          done
          # Final assertion — fail loudly if /health never came up.
          # Without /health we cannot meaningfully test /predict.
          curl -fsS "http://localhost:${PORT}/health" \
            || { echo "::error::Service /health never came up"; \
                 cat /tmp/portfwd.log; \
                 kubectl -n "${SERVICE_SLUG}-dev" describe pods; \
                 exit 1; }

      - name: Post 100 valid + 5 invalid requests through /predict
        run: |
          set -euo pipefail
          # Canonical valid payload — MUST conform to the
          # PredictionRequest schema in templates/service/app/schemas.py.
          # If you change those fields, update both this body AND the
          # json_schema_extra examples in schemas.py (they should track).
          # Fields:
          #   entity_id    — D-20 mandatory stable business key
          #   feature_a    — float, 0..150 (e.g. age)
          #   feature_b    — float, >= 0 (e.g. balance)
          #   feature_c    — categorical (placeholder default)
          # slice_values is optional; we include one to exercise the
          # sliced-perf path too.
          VALID_BODY='{"entity_id":"e2e_synthetic","slice_values":{"country":"MX"},"feature_a":42.0,"feature_b":50000.0,"feature_c":"category_A"}'
          INVALID_BODY='{}'
          ok=0
          for i in $(seq 1 100); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST "http://localhost:${PORT}/predict" \
              -H 'Content-Type: application/json' \
              -d "${VALID_BODY}" || echo "000")
            case "${code}" in
              2*) ok=$((ok + 1)) ;;
              *) echo "::error::expected 2xx from valid /predict request, got ${code}"; exit 1 ;;
            esac
          done
          for i in $(seq 1 5); do
            curl -s -o /dev/null \
              -X POST "http://localhost:${PORT}/predict" \
              -H 'Content-Type: application/json' \
              -d "${INVALID_BODY}" || true
          done
          echo "Posted 100 valid (acked: ${ok}) + 5 invalid"
          if [ "${ok}" -ne 100 ]; then
            echo "::error::Only ${ok}/100 valid requests returned 2xx"
            exit 1
          fi

      - name: Verify /metrics counter increments
        run: |
          set -euo pipefail
          # Buffered flush: the logger flushes every N seconds OR every
          # K requests, whichever comes first. Allow a few seconds for
          # the background task to drain.
          sleep 8

          metrics=$(curl -fsS "http://localhost:${PORT}/metrics")
          echo "${metrics}" | grep -E "^${SERVICE_SLUG}_(prediction_log_total|requests_total|prediction_log_errors_total)" \
            | head -20 || true

          # Closed-loop proof requires prediction_log_total. A request
          # counter alone proves HTTP traffic, not prediction logging.
          predlog=$(echo "${metrics}" | awk -v svc="${SERVICE_SLUG}" '
            $1 ~ "^"svc"_prediction_log_total" {sum += $NF}
            END {print sum+0}')

          echo "prediction_log_total = ${predlog}"

          # PR-R2-9 audit contract: at least 100 prediction events logged.
          floor=100
          if [ "${predlog}" -lt "${floor}" ]; then
            echo "::error::Closed-loop prediction_log_total < ${floor}: ${predlog}"
            echo "Full metrics dump:"
            echo "${metrics}"
            exit 1
          fi
          echo "::notice::Closed-loop verified — counter >= ${floor}"

      - name: Stop port-forward + summary
        if: always()
        run: |
          if [ -f /tmp/portfwd.pid ]; then
            kill "$(cat /tmp/portfwd.pid)" 2>/dev/null || true
          fi
          {
            echo "## Closed-loop verification — Stage 1"
            echo ""
            echo "Result: **${{ job.status }}**"
            echo ""
            echo "Stage 1 proves: scaffolded service emits the prediction-log"
            echo "counter when /predict traffic flows through. This validates"
            echo "the buffered logger contract (D-21, D-22) on the live path."
            echo ""
            echo "Stage 2 (alert firing via Prometheus + Pushgateway) is"
            echo "tracked as PR-R2-9b in ADR-016."
          } >> "${GITHUB_STEP_SUMMARY}"
